meters:
- name: annual_subscription
  description: Annual platform subscription fee for the selected plan tier (Core, Fusion, Enterprise).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: labeling_hours
  description: Labeling-hours consumed against the annual usage allotment; the primary variable cost driver.
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - dataset
  - plan
- name: points_per_cloud
  description: Point count per point cloud processed; capped per tier (e.g., up to 500,000 on Core).
  unit: points
  aggregation: sum
  dimensions:
  - account
  - dataset
- name: stored_assets
  description: Images, point clouds, and multi-sensor sequences uploaded to Segments.ai-managed storage.
  unit: assets
  aggregation: sum
  dimensions:
  - account
  - dataset
principles:
- name: Visibility
  description: Track labeling-hours consumed per dataset/project against the annual allotment via the metrics dashboard.
- name: Allocation
  description: Map datasets and projects to internal teams/cost centers; unlimited seats means per-project usage, not seats, drives cost.
- name: Optimization
  description: Use prelabeling, active learning, and QA workflows to cut manual labeling-hours; right-size point cloud density; reuse releases instead of re-labeling.
- name: Accountability
  description: Assign owners per dataset; review labeling-hour burn against the annual commitment to avoid overage on Fusion/Enterprise.
