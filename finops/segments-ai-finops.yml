description: >-
  FinOps view of Segments.ai spend. Segments.ai bills as an annual platform
  subscription whose primary cost driver is labeling-hours consumed per year
  (Core, Fusion, Enterprise tiers), with unlimited seats and projects. The REST
  API and Python SDK are not separately metered, so API-side cost optimization
  focuses on controlling how much paid labeling work is generated - dataset
  scope, sample volume, prelabeling/active learning to reduce manual hours, and
  reuse of releases - rather than on per-call charges.
notes: >-
  Per-hour and included-hours figures reflect the public pricing page at
  capture time and are subject to negotiation for Fusion/Enterprise; verify
  committed hours and overage terms with Segments.ai during reconciliation.
sources:
- https://segments.ai/pricing
- https://docs.segments.ai
