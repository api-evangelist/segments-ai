aid: segments-ai
url: https://raw.githubusercontent.com/api-evangelist/segments-ai/refs/heads/main/apis.yml
name: Segments.ai
kind: company
description: Segments.ai is a data-labeling platform for computer vision, supporting
  2D image segmentation and vectors as well as 3D point cloud and multi-sensor fusion
  annotation. Its REST API and Python SDK let teams manage datasets, samples, labels,
  labelsets, and versioned releases programmatically for building training data
  pipelines.
